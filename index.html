<script type="module">

    import * as THREE from 'three';

    
    import { GPUStatsPanel } from 'three/addons/utils/GPUStatsPanel.js';

    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Line2 } from 'three/addons/lines/Line2.js';
    import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
    import { LineGeometry } from 'three/addons/lines/LineGeometry.js';
    import * as GeometryUtils from 'three/addons/utils/GeometryUtils.js';

    let line, renderer, scene, camera, controls, container;
    let line1;
    let matLine, matLineBasic, matLineDashed;
    
    let gui;
    let bg_grid_size;

    
    let insetWidth;
    let insetHeight;

    let global_scale, global_scroll_amt;


    const special_constant = 0.6154797086703873410674645891239936;

    init();
    animate();

    function init() {
        bg_grid_size = 6;
        update_global_scale();
        global_scroll_amt = 0.0;

        container = document.getElementById('canvasthreejs');

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0.0);
        renderer.setSize(window.innerWidth, window.innerHeight);

        container.appendChild(renderer.domElement);

        scene = new THREE.Scene();

        scene.add(new THREE.AmbientLight(0xffffff));

        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 1000);
        
        camera.position.set(0, 0, 60);


        controls = new OrbitControls(camera, renderer.domElement);
        controls.minDistance = 10;
        controls.maxDistance = 500;
        controls.zoomSpeed = 0.7;

        controls.enableZoom = true;
        controls.enablePan = true;
        controls.enableRotate = false;
        controls.listenToKeyEvents(window);
        controls.mouseButtons = {
            MIDDLE: THREE.MOUSE.DOLLY,
            LEFT: THREE.MOUSE.PAN
        }
        controls.touches = {
            ONE: THREE.TOUCH.PAN,
            TWO: THREE.TOUCH.DOLLY_PAN
        }
        controls.keys = {
            RIGHT: 'ArrowLeft', 
            BOTTOM: 'ArrowUp', 
            LEFT: 'ArrowRight', 
            UP: 'ArrowDown' 
        }
        controls.keyPanSpeed = 20;
        init_background();


        window.addEventListener('resize', onWindowResize);
        onWindowResize();

    }

    function init_background() {

        let m = bg_grid_size;
        for (let i = -m; i < m + 1; i++)
            for (let j = -m; j < m + 1; j++)
                if (in_grid(i, j, m)) {
                    let v = global_transform(new THREE.Vector3(i, 0, j));
                    v = scrolling(v);
                    v.z = -10;
                    
                    const geometry = new THREE.SphereGeometry(0.2, 10, 10);
                    const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
                    const sphere = new THREE.Mesh(geometry, material);
                    console.log(v);
                    sphere.position.set(v.x, v.y, v.z);
                    
                    scene.add(sphere);

                }

    }

    function in_grid(i, j, rad) {
        
        return - j < 1 + i + rad && (j - rad - 1) < - i;
    }

    function transform_(v) {
        return transform(v, 1);
    }
    function transform(v, amt) {
        return rotX(rotY(v, Math.PI * 0.25 * amt), -special_constant * amt);
    }
    function untransform_(v) {
        return untransform(v, 1);
    }
    function untransform(v, amt) {
        return rotY(rotX(v, special_constant * amt), -Math.PI * 0.25 * amt);
    }
    function global_transform(v) {
        return transform_(v.multiplyScalar(global_scale));
        
        
    }
    function scrolling(v) {
        return v;
    }

    function rotX(v, th) {
        return v.applyAxisAngle(new THREE.Vector3(1, 0, 0), th);
    }
    function rotY(v, th) {
        return v.applyAxisAngle(new THREE.Vector3(0, 1, 0), th);
    }
    function rotZ(v, th) {
        return v.applyAxisAngle(new THREE.Vector3(0, 0, 1), th);
    }

    function onWindowResize() {

        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();

        renderer.setSize(window.innerWidth, window.innerHeight);

        insetWidth = window.innerHeight / 4; 
        insetHeight = window.innerHeight / 4;

        update_global_scale();

    }

    function update_global_scale() {
        global_scale = 0.1 * Math.sqrt(window.innerWidth * window.innerWidth + window.innerHeight * window.innerHeight) / (2 * bg_grid_size + 1);
    }

    function animate() {

        requestAnimationFrame(animate);

        

        

        renderer.setClearColor(0x000000, 0);

        renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);

        
        

        renderer.render(scene, camera);


        

        

        

        

        


        

        

    }



</script>

<script>
  document.getElementById("theme-toggle").addEventListener("click", () => {
    if (document.body.className.includes("dark")) {
      document.body.classList.remove('dark');
      localStorage.setItem("pref-theme", 'light');
    } else {
      document.body.classList.add('dark');
      localStorage.setItem("pref-theme", 'dark');
    }
  })

</script>
<script>
  if (localStorage.getItem("pref-theme") === "dark") {
    document.body.classList.add('dark');
  } else if (localStorage.getItem("pref-theme") === "light") {
    document.body.classList.remove('dark')
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.body.classList.add('dark');
  }

</script>
