<script type="module">

    import * as THREE from 'three';

    
    import { GPUStatsPanel } from 'three/addons/utils/GPUStatsPanel.js';

    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Line2 } from 'three/addons/lines/Line2.js';
    import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
    import { LineGeometry } from 'three/addons/lines/LineGeometry.js';
    import * as GeometryUtils from 'three/addons/utils/GeometryUtils.js';

    let line, renderer, scene, camera, controls, container;
    let line1;
    let matLine, matLineBasic, matLineDashed;
    
    let gui;

    
    let insetWidth;
    let insetHeight;

    init();
    animate();

    function init() {
        container = document.getElementById('canvasthreejs');

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0.0);
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        container.appendChild(renderer.domElement);

        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(- 40, 0, 60);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.minDistance = 10;
        controls.maxDistance = 500;


        

        const positions = [];
        const colors = [];

        const points = GeometryUtils.hilbert3D(new THREE.Vector3(0, 0, 0), 20.0, 1, 0, 1, 2, 3, 4, 5, 6, 7);

        const spline = new THREE.CatmullRomCurve3(points);
        const divisions = Math.round(12 * points.length);
        const point = new THREE.Vector3();
        const color = new THREE.Color();

        for (let i = 0, l = divisions; i < l; i++) {

            const t = i / l;

            spline.getPoint(t, point);
            positions.push(point.x, point.y, point.z);

            color.setHSL(t, 0.0, 0.5, THREE.SRGBColorSpace);
            colors.push(color.r, color.g, color.b);

        }



        const geometry = new LineGeometry();
        geometry.setPositions(positions);
        geometry.setColors(colors);

        matLine = new LineMaterial({

            color: 0xffffff,
            linewidth: 5, 
            vertexColors: true,

            dashed: false,
            alphaToCoverage: true,

        });

        line = new Line2(geometry, matLine);
        line.computeLineDistances();
        line.scale.set(1, 1, 1);
        scene.add(line);

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        matLineBasic = new THREE.LineBasicMaterial({ vertexColors: true });
        matLineDashed = new THREE.LineDashedMaterial({ vertexColors: true, scale: 2, dashSize: 1, gapSize: 1 });

        line1 = new THREE.Line(geo, matLineBasic);
        line1.computeLineDistances();
        line1.visible = false;
        scene.add(line1);

        window.addEventListener('resize', onWindowResize);
        onWindowResize();

    }

    function onWindowResize() {

        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();

        renderer.setSize(window.innerWidth, window.innerHeight);

        insetWidth = window.innerHeight / 4; 
        insetHeight = window.innerHeight / 4;

    }

    function animate() {

        requestAnimationFrame(animate);

        

        

        renderer.setClearColor(0x000000, 0);

        renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);

        
        matLine.resolution.set(window.innerWidth, window.innerHeight); 

        renderer.render(scene, camera);


        renderer.setClearColor(0x222222, 1);

        renderer.clearDepth(); 

        renderer.setScissorTest(true);

        renderer.setScissor(20, 20, insetWidth, insetHeight);

        renderer.setViewport(20, 20, insetWidth, insetHeight);


        matLine.resolution.set(insetWidth*0.5, insetHeight*0.5); 

        renderer.setScissorTest(false);

    }

    
</script>

<script>
  document.getElementById("theme-toggle").addEventListener("click", () => {
    if (document.body.className.includes("dark")) {
      document.body.classList.remove('dark');
      localStorage.setItem("pref-theme", 'light');
    } else {
      document.body.classList.add('dark');
      localStorage.setItem("pref-theme", 'dark');
    }
  })

</script>
<script>
  if (localStorage.getItem("pref-theme") === "dark") {
    document.body.classList.add('dark');
  } else if (localStorage.getItem("pref-theme") === "light") {
    document.body.classList.remove('dark')
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.body.classList.add('dark');
  }

</script>
