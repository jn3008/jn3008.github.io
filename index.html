<script type="module">
  import * as THREE from 'three';

  var container, camera, scene, renderer, clock;
  var uniforms, material, mesh;
  

  function map_(value, start1, stop1, start2, stop2) {
      return (value - start1) / (stop1 - start1) * (stop2 - start2) + start2;
  }
  function lerp(start, stop, value) {
      return map_(value, 0, 1, start, stop);
  }


  init();
  animate();
  

  function init() {
      container = document.getElementById('canvasthreejs');

      
      camera = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 0.1, 100 );
      camera.position.set( 0, 0, 2 );

      scene = new THREE.Scene();
      clock = new THREE.Clock();

      renderer = new THREE.WebGLRenderer();

      var geometry = new THREE.PlaneGeometry(2, 2);

      uniforms = {
          u_time: { type: "f", value: 0.0 },
          u_resolution: { type: "v2", value: new THREE.Vector2() },
          u_mouse: { type: "v2", value: new THREE.Vector3() },
          u_drawing: { type: "b", value: false }
      };
      function m_is_pressed() {
        console.log('m pressed');
      }


      material = new THREE.ShaderMaterial({
          uniforms: uniforms,
          vertexShader: document.getElementById('vertexShader').textContent,
          
          fragmentShader: String.raw`
          uniform vec2 u_resolution;
          uniform float u_time;
          uniform vec2 u_mouse;
          uniform bool u_drawing;

          uniform float u_size;

          float ease(float p, float g) {
              if (p < 0.4)
                return 0.5 * pow(2.*p, g);
              else
                return 1. - 0.5 * pow(2.*(1. - p), g);
            }

          float mapp(float p, float a, float b, float c, float d) {
            return c+(p-a)*(d-c)/(b-a);
          }

          float random (vec2 st) {
              return fract(sin(dot(st.xy,
              vec2(12.9898,78.233)))*
              43758.5453123);
          }

          
          
          
          

          vec3 hash( vec3 p ) 
          {
            p = vec3( dot(p,vec3(127.1,311.7, 74.7)),
                  dot(p,vec3(269.5,183.3,246.1)),
                  dot(p,vec3(113.5,271.9,124.6)));

            return -1.0 + 2.0*fract(sin(p)*43758.5453123);
          }
          float noise( in vec3 p )
          {
              vec3 i = floor( p );
              vec3 f = fract( p );
            
            vec3 u = f*f*(3.0-2.0*f);

              return mix( mix( mix( dot( hash( i + vec3(0.0,0.0,0.0) ), f - vec3(0.0,0.0,0.0) ), 
                                    dot( hash( i + vec3(1.0,0.0,0.0) ), f - vec3(1.0,0.0,0.0) ), u.x),
                              mix( dot( hash( i + vec3(0.0,1.0,0.0) ), f - vec3(0.0,1.0,0.0) ), 
                                    dot( hash( i + vec3(1.0,1.0,0.0) ), f - vec3(1.0,1.0,0.0) ), u.x), u.y),
                          mix( mix( dot( hash( i + vec3(0.0,0.0,1.0) ), f - vec3(0.0,0.0,1.0) ), 
                                    dot( hash( i + vec3(1.0,0.0,1.0) ), f - vec3(1.0,0.0,1.0) ), u.x),
                              mix( dot( hash( i + vec3(0.0,1.0,1.0) ), f - vec3(0.0,1.0,1.0) ), 
                                    dot( hash( i + vec3(1.0,1.0,1.0) ), f - vec3(1.0,1.0,1.0) ), u.x), u.y), u.z );
          }


          void main() {
              vec2 pos = gl_FragCoord.xy;
              vec2 r = u_resolution.xy;
              vec2 m = u_mouse/u_resolution;

              vec2 uv = pos/r;


              
              
              
              
              
              
              
              

              float scl = 140.0;
              vec3 starpos = scl*(vec3(pos/r.x * 2.0f - 1.0f, 1.0f)); 
              
              float stars_threshold = 8.0f; 
              float easeval = 1.0;
              vec3 displace = 0.0*vec3(0.0,u_time*m.y*5.,0.0);
              
              
              float stars = 160.0*ease(pow(clamp(noise(starpos+displace), 0.0f, 1.0f), stars_threshold), easeval);
              stars *= mix(0.2, 1.8, ease(mapp(noise(starpos * scl*0.2-displace + 0.8*vec3(u_time)),-0.0,1.0,0.0,1.0), 1.0)); 
	


              
              
              
              
              
              
              
              
              
              
              
              
              
              
              
              
              
              
              
              
              gl_FragColor = vec4(vec3(stars),1.0);
          }
          

          `
      });


      mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      container.appendChild(renderer.domElement);

      onWindowResize();

      document.onmousemove = function (e) {

          uniforms.u_mouse.value.x = e.clientX - renderer.domElement.offsetLeft;
          uniforms.u_mouse.value.y = e.clientY - renderer.domElement.offsetTop;

          let mx = uniforms.u_mouse.value.x / renderer.domElement.width;
          let my = uniforms.u_mouse.value.y / renderer.domElement.height;

      }
      document.onmousedown = function () {
          uniforms.u_drawing.value = true;
      }
      document.onmouseup = function () {
          uniforms.u_drawing.value = false;
      }
      document.onkeydown = function (e) {
          if (e.keyCode === 77) { 
              m_is_pressed();
          }
      }
  }
  window.addEventListener( 'resize', onWindowResize, false );
  function onWindowResize(event) {
      let width = window.innerWidth;
      
      
      let height = window.innerHeight;

      renderer.setSize(width, height);
      uniforms.u_resolution.value.x = width;
      uniforms.u_resolution.value.y = height;
  }

  function animate() {
      requestAnimationFrame(animate);
      render();
  }

  function render() {
      uniforms.u_time.value += clock.getDelta();


      mesh.material = material;

      renderer.render(scene, camera);

  }
</script>

  document.getElementById("theme-toggle").addEventListener("click", () => {
    if (document.body.className.includes("dark")) {
      document.body.classList.remove('dark');
      localStorage.setItem("pref-theme", 'light');
    } else {
      document.body.classList.add('dark');
      localStorage.setItem("pref-theme", 'dark');
    }
  })

</script>

    document.body.classList.add('dark');

    document.body.classList.remove('dark')
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.body.classList.add('dark');
  }

</script>
